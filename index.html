            <h2 className="text-lg font-bold text-[#F3E5AB] flex items-center gap-2 border-b border-slate-700/50 pb-3">
              <IconMap size={20} className="text-[#D4AF37]"/> Visão Futura & Estágios
            </h2>
            <p className="text-xs text-slate-400">Áreas que mais gosta, professores referência, networking e estágios alvo.</p>
            <textarea className="royale-input w-full flex-1 p-3 text-sm resize-none custom-scroll" value={strategy?.future || ''} onChange={e => handleChange('future', e.target.value)} placeholder="Onde quero estagiar? Quem pode me indicar?"></textarea>
          </div>

          <div className="royale-panel p-6 flex flex-col gap-4 shadow-lg lg:col-span-1">
            <h2 className="text-lg font-bold text-[#F3E5AB] flex items-center gap-2 border-b border-slate-700/50 pb-3">
              <IconBook size={20} className="text-[#D4AF37]"/> Projetos Longos & TCC
            </h2>
            <p className="text-xs text-slate-400">Ideias para TCC, Iniciação Científica e Projetos de Extensão.</p>
            <textarea className="royale-input w-full flex-1 p-3 text-sm resize-none custom-scroll" value={strategy?.longTerm || ''} onChange={e => handleChange('longTerm', e.target.value)} placeholder="Ideias para o projeto integrador/TCC..."></textarea>
          </div>

          <div className="royale-panel p-6 flex flex-col gap-4 shadow-lg lg:col-span-1 border-t-2 border-t-green-500">
            <h2 className="text-lg font-bold text-green-400 flex items-center gap-2 border-b border-slate-700/50 pb-3">
              <IconTarget size={20}/> Espaço da Vida Real
            </h2>
            <p className="text-xs text-slate-400">Engenharia já cobra demais. Burnout não melhora nota. Defina suas regras.</p>
            <textarea className="royale-input w-full flex-1 p-3 text-sm resize-none custom-scroll border-green-900/30 bg-green-900/10" value={strategy?.realLife || ''} onChange={e => handleChange('realLife', e.target.value)} placeholder="Sono obrigatório: 7h. Dias de treino..."></textarea>
          </div>
        </div>
      );
    }

    // --- POMODORO WIDGET ---
    function PomodoroWidget() {
      const [pomoTime, setPomoTime] = useState(25 * 60);
      const [totalTime, setTotalTime] = useState(25 * 60);
      const [pomoActive, setPomoActive] = useState(false);
      const [pomoMode, setPomoMode] = useState('work'); 

      useEffect(() => {
        let interval = null;
        if (pomoActive && pomoTime > 0) interval = setInterval(() => setPomoTime(t => t - 1), 1000);
        else if (pomoTime === 0 && pomoActive) {
          setPomoActive(false);
          const nextMode = pomoMode === 'work' ? 'break' : 'work';
          const nextTime = nextMode === 'work' ? 25 * 60 : 5 * 60;
          setPomoMode(nextMode); setPomoTime(nextTime); setTotalTime(nextTime);
        }
        return () => clearInterval(interval);
      }, [pomoActive, pomoTime, pomoMode]);

      const formatTime = (s) => `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
      const setMode = (mode, minutes) => { setPomoActive(false); setPomoMode(mode); setPomoTime(minutes * 60); setTotalTime(minutes * 60); };

      const radius = 60; const circumference = 2 * Math.PI * radius;
      const strokeDashoffset = circumference - (pomoTime / totalTime) * circumference;
      const ringColor = pomoMode === 'work' ? '#D4AF37' : '#3B82F6';

      return (
        <div className="royale-panel p-6 flex flex-col items-center">
          <h2 className="text-lg font-bold mb-6 text-white w-full flex items-center gap-2 border-b border-slate-700/50 pb-3">
            <span className="text-[#D4AF37] bg-[#D4AF37]/10 p-1.5 rounded-lg"><IconClock size={18} /></span> Rotina & Prática
          </h2>
          <div className="flex justify-center gap-3 mb-8 w-full">
            <button onClick={() => setMode('work', 25)} className={`flex-1 py-2 text-xs uppercase tracking-widest rounded-lg font-bold transition-all ${pomoMode === 'work' ? 'bg-[#D4AF37]/20 text-[#D4AF37] border border-[#D4AF37]/50 shadow-[0_0_10px_rgba(212,175,55,0.2)]' : 'bg-slate-800 text-slate-400'}`}>Bloco de Foco</button>
            <button onClick={() => setMode('break', 5)} className={`flex-1 py-2 text-xs uppercase tracking-widest rounded-lg font-bold transition-all ${pomoMode === 'break' ? 'bg-blue-500/20 text-blue-400 border border-blue-500/50 shadow-[0_0_10px_rgba(59,130,246,0.2)]' : 'bg-slate-800 text-slate-400'}`}>Pausa Offline</button>
          </div>
          <div className="relative flex items-center justify-center mb-8">
            <svg width="180" height="180" className="transform -rotate-90">
              <circle cx="90" cy="90" r={radius} stroke="#1E293B" strokeWidth="8" fill="none" />
              <circle cx="90" cy="90" r={radius} stroke={ringColor} strokeWidth="8" fill="none" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" className="pomo-ring" />
            </svg>
            <div className="absolute flex flex-col items-center">
              <span className="text-4xl font-black font-mono tracking-wider text-slate-100">{formatTime(pomoTime)}</span>
              <span className="text-[10px] uppercase font-bold text-slate-500 mt-1">{pomoMode === 'work' ? 'Exercícios/Teoria' : 'Descansando'}</span>
            </div>
          </div>
          <div className="flex justify-center gap-4 w-full px-4">
            <button onClick={() => setPomoActive(!pomoActive)} className={`flex-2 ${pomoActive ? 'bg-slate-700 hover:bg-slate-600 border border-slate-500 text-white' : 'royale-btn-gold'} px-8 py-3 rounded-xl font-bold uppercase tracking-widest w-full text-sm`}>{pomoActive ? 'Pausar' : 'Iniciar'}</button>
            <button onClick={() => setMode(pomoMode, pomoMode === 'work' ? 25 : 5)} className="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-4 py-3 rounded-xl font-bold uppercase tracking-widest text-sm">Reset</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
